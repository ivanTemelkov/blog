---
layout: default
---

<article class="post">
  <header class="post-header">
    <h1>{{ page.title }}</h1>
    <p class="post-meta">
      {% if page.date %}
        <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%Y-%m-%d" }}</time>
      {% endif %}
      {% if page.tags.size > 0 %}
        <span>{{ page.tags | join: ", " }}</span>
      {% endif %}
    </p>
  </header>

  {{ content }}
</article>
